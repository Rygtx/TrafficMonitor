name: Build TrafficMonitor

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2
      - name: Build Solution
        run: msbuild TrafficMonitor.sln /p:Configuration=Release
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: TrafficMonitor-build
          path: |
            TrafficMonitor/Release/
            OpenHardwareMonitorApi/Release/
            PluginDemo/Release/
